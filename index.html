<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Portafolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="logo">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTsTdjP8yEhEBXvo-UJVapFWuiNhBGnZCJxKA&s">
  </div>

  <div class="titulo">Portafolio</div>

  <div class="usuario">
    Ismael
    <span class="admin-btn" onclick="mostrarLogin()">👤</span>
  </div>
</header>

<main>
  <h2>Semanas</h2>

  <div class="acciones">
    <button id="btnAgregar" onclick="agregarSemana()" style="display:none;">
      ➕ Agregar Semana
    </button>

    <button id="btnImagenGlobal" onclick="agregarImagenSemana()" style="display:none;">
      🖼️ Agregar Imagen a Semana
    </button>
  </div>

  <div id="contenedor-semanas"></div>
</main>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="login-box">
    <span class="cerrar" onclick="cerrarLogin()">❌</span>
    <h3>Modo Desarrollador</h3>
    <input type="text" id="user" placeholder="Usuario">
    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="login()">Ingresar</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
